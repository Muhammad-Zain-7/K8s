apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: gameverse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 509399631926.dkr.ecr.us-east-1.amazonaws.com/k8s-frontend:latest
          ports:
            - containerPort: 80
