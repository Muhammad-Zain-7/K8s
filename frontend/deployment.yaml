apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: gameverse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 509399631926.dkr.ecr.<region>.amazonaws.com/k8s-frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: VITE_API_URL
              value: "/api"
