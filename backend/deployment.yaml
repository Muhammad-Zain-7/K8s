apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: gameverse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 509399631926.dkr.ecr.<region>.amazonaws.com/k8s-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
